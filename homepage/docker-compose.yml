services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=10.20.30.100:3000,home.palkia.local
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - palkia_network

networks:
  palkia_network:
    external: true
